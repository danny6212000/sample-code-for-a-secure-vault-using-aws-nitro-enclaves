version: 0.2
phases:
  build:
    commands:
      - |
        docker run --rm \
          -v "$(pwd)/enclave":/workspace \
          -w /workspace \
          public.ecr.aws/docker/library/rust:alpine@sha256:7f752ee8ea5deb9f4863d8c3f228a216a6466619882f09a44b9eda9617dc7770 \
          sh -c "cargo generate-lockfile 2>&1 && echo '===LOCKFILE_START===' && cat Cargo.lock && echo '===LOCKFILE_END==='"
artifacts:
  discard-paths: yes
  files:
    - vault_template.yml
    - vault_template_configuration.json
